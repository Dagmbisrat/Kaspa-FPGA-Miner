name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator python3 python3-pip
          pip3 install pycryptodome

      - name: keccak
        run: make -C hw/crypto/keccak runtest

      - name: cshake256
        run: make -C hw/crypto/cshake256 runtest

      - name: xoshiro256pp
        run: make -C hw/utils/xoshiro256pp runtest

      - name: matrix_generator
        run: make -C hw/matrix/matrix_generator runtest

      - name: matmul_unit
        run: make -C hw/matrix/matmul_unit runtest

      - name: core
        run: make -C hw/core runtest

      - name: Upload waveforms on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: waveforms
          path: hw/**/sim/*.vcd
          if-no-files-found: ignore
